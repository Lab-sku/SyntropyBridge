<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- L15: PWA manifest + theme color (matches the dark ink-900 brand) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>中转平台</title>
    <script>
      // Apply the theme synchronously *before* the React tree mounts so we
      // never paint a flash of the wrong theme. The choice is persisted by
      // useTheme() under the `app_theme` key; we honour `light`/`dark` and
      // fall back to the OS preference otherwise.
      //
      // We set both `data-theme` (for custom CSS) and the `.dark` class
      // (for Tailwind's `darkMode: 'class'` strategy).
      (function () {
        try {
          var saved = window.localStorage.getItem('app_theme');
          var theme = saved === 'light' || saved === 'dark' ? saved : null;
          if (!theme) {
            theme =
              window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          }
          var el = document.documentElement;
          el.setAttribute('data-theme', theme);
          el.classList.toggle('dark', theme === 'dark');
          el.style.colorScheme = theme;
        } catch (e) {
          // localStorage may be unavailable; leave the page in default
          // (light) tokens and let useTheme() reconcile later.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
