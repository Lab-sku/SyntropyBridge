services:
  api:
    image: api-zhuanzhuan:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: api-zhuanzhuan
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.production
    environment:
      - DATABASE_PATH=/app/data/data.db
      - ENV=production
    volumes:
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: api-zhuanzhuan:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: api-zhuanzhuan-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DATABASE_PATH=/app/data/data.db
      - ENV=production
    volumes:
      - api-data:/app/data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting subscription worker cron (hourly)..."
        LOCKFILE=/tmp/api-worker.lock
        while true; do
          if flock -n "$$LOCKFILE"; then
            echo "[$$(date)] Running daily subscription jobs..."
            python -c "from backend.services.subscription_service import SubscriptionService; print(SubscriptionService.run_daily_jobs())" || echo "[$$(date)] Worker job failed"
            flock -u "$$LOCKFILE"
          else
            echo "[$$(date)] Previous job still running, skipping"
          fi
          sleep 3600
        done
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  api-data:
    driver: local
